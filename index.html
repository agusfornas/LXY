<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>LifeXY</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;touch-action:manipulation;-webkit-tap-highlight-color:transparent;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',sans-serif}
body{background:linear-gradient(165deg,#EAF5FD 0%,#D6EEFB 25%,#C0E5F9 50%,#D0EBFA 75%,#EDF7FE 100%);position:relative;overflow:hidden}
canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0}

.scr{position:fixed;top:0;left:0;right:0;bottom:0;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:60px 32px calc(env(safe-area-inset-bottom,20px)+32px);z-index:2;opacity:0;pointer-events:none;transition:opacity 0.6s ease}
.scr.on{opacity:1;pointer-events:all}

.logo{font-size:58px;font-weight:600;color:#1A3A52;letter-spacing:-2.5px;line-height:1}
.logo .x{color:#1E88C3}.logo .y{color:#5BA3D9}

.btn{width:100%;padding:16px;border-radius:50px;text-align:center;cursor:pointer;position:relative;overflow:hidden;user-select:none;border:none;outline:none;transition:transform .12s cubic-bezier(.25,.46,.45,.94)}
.btn.pressed{transform:scale(.95)}
.bp{background:rgba(30,136,195,.55);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.35);box-shadow:0 8px 32px rgba(30,136,195,.15),inset 0 1px 0 rgba(255,255,255,.45),inset 0 -1px 0 rgba(255,255,255,.1),inset 0 0 12px 4px rgba(255,255,255,.15)}
.bp::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.7),transparent)}
.bp span{font-size:16px;font-weight:600;color:#FFF;letter-spacing:.2px;position:relative;z-index:1}
.bs{background:rgba(255,255,255,.25);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.5);box-shadow:0 8px 32px rgba(0,0,0,.04),inset 0 1px 0 rgba(255,255,255,.7),inset 0 -1px 0 rgba(255,255,255,.15),inset 0 0 12px 4px rgba(255,255,255,.2)}
.bs::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.8),transparent)}
.bs span{font-size:16px;font-weight:500;color:rgba(30,70,100,.6);position:relative;z-index:1}
.btns{width:100%;max-width:340px;display:flex;flex-direction:column;gap:10px}

.bb{position:fixed;top:calc(env(safe-area-inset-top,16px)+16px);left:24px;width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.2);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.4);box-shadow:inset 0 1px 0 rgba(255,255,255,.5),inset 0 0 8px 3px rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:20;user-select:none;transition:transform .12s ease;opacity:0;pointer-events:none}
.bb.on{opacity:1;pointer-events:all}
.bb.pressed{transform:scale(.9)}
.bb svg{width:18px;height:18px;stroke:rgba(30,70,100,.45);stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}

@keyframes fa{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-5px) rotate(.4deg)}}
@keyframes fb{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-4px) rotate(-.5deg)}}
@keyframes fc{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-6px) rotate(.3deg)}}

.qt{font-size:28px;font-weight:600;color:#1A3A52;letter-spacing:-.8px;text-align:center;margin-bottom:32px;opacity:0;transform:translateY(20px);transition:opacity .7s ease .2s,transform .7s ease .2s}
.qt.v{opacity:1;transform:translateY(0)}
.ig{width:100%;max-width:300px;padding:16px 24px;border-radius:50px;background:rgba(255,255,255,.3);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.55);box-shadow:inset 0 1px 0 rgba(255,255,255,.7),inset 0 0 12px 4px rgba(255,255,255,.15);font-size:18px;font-weight:500;color:#1A3A52;text-align:center;outline:none;font-family:inherit;opacity:0;transition:opacity .7s ease .4s,transform .7s ease .4s,border-color .3s,box-shadow .3s}
.ig::placeholder{color:rgba(30,70,100,.3);font-weight:400}
.ig:focus{border-color:rgba(30,136,195,.4);box-shadow:inset 0 1px 0 rgba(255,255,255,.7),inset 0 0 12px 4px rgba(255,255,255,.15),0 0 0 3px rgba(30,136,195,.1)}
.ig.v{opacity:1;animation:fa 5.5s ease-in-out infinite}
.dl{font-size:13px;color:rgba(30,70,100,.4);text-align:center;margin-top:20px;opacity:0;transform:translateY(10px);transition:opacity .7s ease,transform .7s ease}
.dl.v{opacity:1;transform:translateY(0)}
.dr{display:flex;gap:10px;width:100%;max-width:300px;margin-top:12px;opacity:0;transform:translateY(20px);transition:opacity .7s ease .15s,transform .7s ease .15s}
.dr.v{opacity:1;transform:translateY(0)}
.dw{flex:1;position:relative}
.dw:nth-child(1){animation:fb 6s ease-in-out infinite}
.dw:nth-child(2){animation:fa 5.2s ease-in-out infinite}
.dw:nth-child(3){animation:fc 6.8s ease-in-out infinite}
.di{width:100%;padding:14px 8px;border-radius:20px;background:rgba(255,255,255,.3);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.55);box-shadow:inset 0 1px 0 rgba(255,255,255,.7),inset 0 0 10px 3px rgba(255,255,255,.12);font-size:17px;font-weight:500;color:#1A3A52;text-align:center;outline:none;font-family:inherit;min-width:0;transition:border-color .3s,box-shadow .3s}
.di::placeholder{color:rgba(30,70,100,.3);font-weight:400;font-size:15px}
.di:focus{border-color:rgba(30,136,195,.4);box-shadow:inset 0 1px 0 rgba(255,255,255,.7),inset 0 0 10px 3px rgba(255,255,255,.12),0 0 0 3px rgba(30,136,195,.1)}
.bc{width:100%;max-width:300px;padding:16px;border-radius:50px;text-align:center;cursor:pointer;position:relative;overflow:hidden;user-select:none;margin-top:28px;opacity:0;pointer-events:none;transition:opacity .7s ease .3s,transform .12s cubic-bezier(.25,.46,.45,.94);background:rgba(30,136,195,.55);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.35);box-shadow:0 8px 32px rgba(30,136,195,.15),inset 0 1px 0 rgba(255,255,255,.45),inset 0 -1px 0 rgba(255,255,255,.1),inset 0 0 12px 4px rgba(255,255,255,.15)}
.bc::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.7),transparent)}
.bc.v{opacity:1;pointer-events:all;animation:fc 7s ease-in-out infinite}
.bc.pressed{transform:scale(.95)}
.bc.off{opacity:.3;pointer-events:none}
.bc span{font-size:16px;font-weight:600;color:#FFF;letter-spacing:.2px;position:relative;z-index:1}

.pn{position:fixed;top:calc(env(safe-area-inset-top,16px)+90px);left:50%;transform:translateX(-50%);font-size:14px;font-weight:600;color:#1A3A52;letter-spacing:-.3px;z-index:16;opacity:0;transition:opacity .6s ease .8s;display:none}
.pn.v{opacity:1}
.avt{position:fixed;left:0;right:0;text-align:center;z-index:10;opacity:0;transform:translateY(12px);transition:opacity .7s ease .3s,transform .7s ease .3s,top .8s ease;top:calc(env(safe-area-inset-top,16px)+40px);font-size:26px;font-weight:600;color:#1A3A52;letter-spacing:-.8px;display:none}
.avt.v{opacity:1;transform:translateY(0)}
.avt.m{top:calc(env(safe-area-inset-top,16px)+115px)}
.af{position:fixed;top:0;left:0;right:0;bottom:0;z-index:5;pointer-events:none;opacity:0;transition:opacity .5s ease}
.af.on{opacity:1;pointer-events:auto}
.av{position:absolute;width:78px;height:78px;border-radius:50%;backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);display:flex;align-items:center;justify-content:center;cursor:pointer;pointer-events:all;user-select:none;opacity:0;overflow:hidden;z-index:6}
.av::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.75),transparent)}
.av::after{content:'';position:absolute;top:0;left:0;width:1px;height:100%;background:linear-gradient(180deg,rgba(255,255,255,.6),transparent 60%)}
.av svg{width:36px;height:36px;pointer-events:none}
.av.pressed{transform:scale(.88)!important}
.av.docked{z-index:16;pointer-events:none;animation:dk 4s ease-in-out infinite}
@keyframes dk{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-4px) rotate(.5deg)}}
@keyframes br{0%,100%{box-shadow:0 6px 24px var(--gc,rgba(0,0,0,.05)),inset 0 1px 0 rgba(255,255,255,.55),inset 0 0 12px 5px rgba(255,255,255,.2)}50%{box-shadow:0 8px 28px var(--gc,rgba(0,0,0,.08)),inset 0 1px 0 rgba(255,255,255,.6),inset 0 0 14px 6px rgba(255,255,255,.25)}}
.avbc{position:fixed;bottom:calc(env(safe-area-inset-bottom,20px)+32px);left:50%;transform:translateX(-50%);width:calc(100% - 64px);max-width:300px;padding:16px;border-radius:50px;background:rgba(30,136,195,.55);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.35);box-shadow:0 8px 32px rgba(30,136,195,.15),inset 0 1px 0 rgba(255,255,255,.45),inset 0 -1px 0 rgba(255,255,255,.1),inset 0 0 12px 4px rgba(255,255,255,.15);text-align:center;cursor:pointer;overflow:hidden;user-select:none;z-index:12;opacity:0;pointer-events:none;transition:opacity .5s ease,transform .12s ease;display:none}
.avbc::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.7),transparent)}
.avbc.v{opacity:1;pointer-events:all}
.avbc.pressed{transform:translateX(-50%) scale(.95)}
.avbc span{font-size:16px;font-weight:600;color:#FFF;letter-spacing:.2px;position:relative;z-index:1}
</style>
</head>
<body>
<canvas id="helix"></canvas>
<div class="bb" id="bb"><svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg></div>

<div class="scr on" id="s1">
  <div style="flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center">

  </div>

</div>

<div class="af" id="af">
  <div class="av" id="a0" style="--gc:rgba(30,150,210,.12);background:rgba(30,150,210,.18);border:1px solid rgba(30,150,210,.35);box-shadow:0 6px 24px rgba(30,150,210,.12),inset 0 1px 0 rgba(255,255,255,.55),inset 0 0 12px 5px rgba(255,255,255,.2);animation:br 3s ease-in-out infinite"><svg viewBox="0 0 40 40" fill="none"><path d="M4 20c4-8 8 8 12 0s8 8 12 0s8 8 12 0" stroke="rgba(20,130,200,.85)" stroke-width="2.5" stroke-linecap="round" fill="none"/><path d="M4 25c4-6 8 6 12 0s8 6 12 0s8 6 12 0" stroke="rgba(80,180,240,.5)" stroke-width="1.5" stroke-linecap="round" fill="none"/></svg></div>
  <div class="av" id="a1" style="--gc:rgba(140,95,50,.1);background:rgba(140,95,50,.16);border:1px solid rgba(140,95,50,.3);box-shadow:0 6px 24px rgba(140,95,50,.1),inset 0 1px 0 rgba(255,255,255,.55),inset 0 0 12px 5px rgba(255,255,255,.2);animation:br 3.4s ease-in-out infinite"><svg viewBox="0 0 40 40" fill="none"><path d="M4 33L16 10l8 14 4-6 8 15z" fill="rgba(140,95,50,.15)" stroke="rgba(140,95,50,.7)" stroke-width="1.8" stroke-linejoin="round"/><circle cx="31" cy="9" r="3.5" fill="rgba(200,165,100,.2)" stroke="rgba(200,165,100,.6)" stroke-width="1.2"/></svg></div>
  <div class="av" id="a2" style="--gc:rgba(50,150,50,.1);background:rgba(50,150,50,.16);border:1px solid rgba(50,150,50,.3);box-shadow:0 6px 24px rgba(50,150,50,.1),inset 0 1px 0 rgba(255,255,255,.55),inset 0 0 12px 5px rgba(255,255,255,.2);animation:br 3.7s ease-in-out infinite"><svg viewBox="0 0 40 40" fill="none"><line x1="20" y1="38" x2="20" y2="18" stroke="rgba(50,150,50,.6)" stroke-width="2.2" stroke-linecap="round"/><circle cx="20" cy="14" r="10" fill="rgba(50,150,50,.1)" stroke="rgba(50,150,50,.55)" stroke-width="1.8"/><circle cx="20" cy="14" r="5" fill="rgba(80,180,80,.15)" stroke="rgba(80,180,80,.45)" stroke-width="1.2"/></svg></div>
  <div class="av" id="a3" style="--gc:rgba(110,50,180,.1);background:rgba(110,50,180,.16);border:1px solid rgba(110,50,180,.3);box-shadow:0 6px 24px rgba(110,50,180,.1),inset 0 1px 0 rgba(255,255,255,.55),inset 0 0 12px 5px rgba(255,255,255,.2);animation:br 3.2s ease-in-out infinite"><svg viewBox="0 0 40 40" fill="none"><circle cx="10" cy="12" r="2.5" fill="rgba(110,50,180,.6)"/><circle cx="28" cy="8" r="1.8" fill="rgba(130,70,200,.5)"/><circle cx="20" cy="22" r="3" fill="rgba(140,80,210,.6)"/><circle cx="33" cy="28" r="2" fill="rgba(110,50,180,.4)"/><circle cx="12" cy="33" r="2.2" fill="rgba(170,120,230,.55)"/><line x1="10" y1="12" x2="28" y2="8" stroke="rgba(110,50,180,.25)" stroke-width="1"/><line x1="28" y1="8" x2="20" y2="22" stroke="rgba(110,50,180,.25)" stroke-width="1"/><line x1="20" y1="22" x2="33" y2="28" stroke="rgba(110,50,180,.25)" stroke-width="1"/><line x1="20" y1="22" x2="12" y2="33" stroke="rgba(110,50,180,.25)" stroke-width="1"/></svg></div>
  <div class="av" id="a4" style="--gc:rgba(20,150,190,.1);background:rgba(20,150,190,.16);border:1px solid rgba(20,150,190,.3);box-shadow:0 6px 24px rgba(20,150,190,.1),inset 0 1px 0 rgba(255,255,255,.55),inset 0 0 12px 5px rgba(255,255,255,.2);animation:br 3.6s ease-in-out infinite"><svg viewBox="0 0 40 40" fill="none"><path d="M20 4C20 4 8 18 8 26a12 12 0 0024 0C32 18 20 4 20 4z" fill="rgba(20,150,190,.1)" stroke="rgba(20,150,190,.6)" stroke-width="1.8"/><ellipse cx="20" cy="26" rx="6" ry="4" fill="none" stroke="rgba(60,190,220,.45)" stroke-width="1.2"/></svg></div>

<script>
var C=document.getElementById('helix'),X=C.getContext('2d'),D=window.devicePixelRatio||2,W,H;
function rz(){W=window.innerWidth;H=window.innerHeight;C.width=W*D;C.height=H*D;C.style.width=W+'px';C.style.height=H+'px';X.setTransform(D,0,0,D,0,0);hCX=W/2;bR=Math.min(W*.16,65)}
rz();window.addEventListener('resize',function(){rz();iH()});

var P=[],BP=[],cnt=100,hCX,bR,vS,tS=.003,ttS=.003,rB=0,trB=0,gO=1,tgO=1,hP=1,thP=1;
function iH(){vS=H/cnt*2.4;P=[];for(var i=0;i<cnt;i++)P.push({bY:Math.floor(i/2)*vS-H*.3,ph:i%2===0?0:Math.PI,pI:Math.floor(i/2),sz:2.2+Math.random()*2.8,op:.1+Math.random()*.2,dr:Math.random()*.3-.15});BP=[];for(var i=0;i<cnt/2;i++)if(i%3===0){var s=3+Math.floor(Math.random()*3);for(var j=0;j<=s;j++)BP.push({pI:i,t:j/s,sz:1.3+Math.random()*1.3,op:.05+Math.random()*.09,bY:i*vS-H*.3})}}
iH();

function lr(a,b,t){return a+(b-a)*t}
var tm=0;
function draw(){X.clearRect(0,0,W,H);tS=lr(tS,ttS,.04);rB=lr(rB,trB,.04);gO=lr(gO,tgO,.05);hP=lr(hP,thP,.025);tm+=tS;var cr=bR+rB,tH=H*1.6,mp=cnt/2;
for(var i=0;i<P.length;i++){var p=P[i],n=p.pI/mp;if(n>hP)continue;var y=p.bY+tm*80%tH-H*.1;var wy=((y%tH)+tH)%tH-H*.1;var a=(p.pI*.22)+tm*2+p.ph;var x=hCX+Math.cos(a)*cr+p.dr*10;var d=Math.sin(a),sz=p.sz*(.7+(d+1)*.25);var op=p.op*(.5+(d+1)*.35);var dt=Math.abs(wy-H/2);var f=dt<H*.32?1:Math.max(0,1-(dt-H*.32)/(H*.18));var e=n>hP*.85?Math.max(0,1-(n-hP*.85)/(hP*.15)):1;X.beginPath();X.arc(x,wy,sz,0,6.283);X.fillStyle='rgba(30,136,195,'+(op*f*gO*e)+')';X.fill()}
for(var j=0;j<BP.length;j++){var b=BP[j],n=b.pI/mp;if(n>hP)continue;var by=b.bY+tm*80%tH-H*.1;var bwy=((by%tH)+tH)%tH-H*.1;var a0=(b.pI*.22)+tm*2,a1=a0+Math.PI;var bx=(hCX+Math.cos(a0)*cr)+((hCX+Math.cos(a1)*cr)-(hCX+Math.cos(a0)*cr))*b.t;var bd=Math.abs(bwy-H/2);var bf=bd<H*.32?1:Math.max(0,1-(bd-H*.32)/(H*.18));var e=n>hP*.85?Math.max(0,1-(n-hP*.85)/(hP*.15)):1;X.beginPath();X.arc(bx,bwy,b.sz,0,6.283);X.fillStyle='rgba(80,170,230,'+(b.op*bf*gO*e)+')';X.fill()}
requestAnimationFrame(draw)}
draw();

var s1=document.getElementById('s1'),s2=document.getElementById('s2');
var bS=document.getElementById('bStart'),bL=document.getElementById('bLogin'),bb=document.getElementById('bb');
var q2=document.getElementById('q2'),ni=document.getElementById('ni'),dlb=document.getElementById('dlb'),drow=document.getElementById('drow'),bc2=document.getElementById('bc2');
var dd=document.getElementById('dd'),dm=document.getElementById('dm'),dy=document.getElementById('dy');
var pn=document.getElementById('pn'),avt=document.getElementById('avt'),af=document.getElementById('af'),avbc=document.getElementById('avbc');
var avEls=document.querySelectorAll('.av');
var userName='',currentScreen=1;

function press(e){e.classList.add('pressed')}
function rel(e){e.classList.remove('pressed')}
function tc(el,down,up){
  el.addEventListener('touchstart',function(e){e.preventDefault();down()},{passive:false});
  el.addEventListener('touchend',function(e){e.preventDefault();up()},{passive:false});
  el.addEventListener('mousedown',down);el.addEventListener('mouseup',up);
}

tc(bS,function(){press(bS);ttS=.018;trB=50},function(){rel(bS);goScreen2()});
tc(bL,function(){press(bL)},function(){rel(bL)});

function goScreen2(){
  ttS=.035;trB=80;
  setTimeout(function(){thP=0;tgO=.6;s1.classList.remove('on')},500);
  setTimeout(function(){ttS=.004;trB=0;tgO=.35;thP=.12;currentScreen=2;
    s2.classList.add('on');bb.classList.add('on');
    setTimeout(function(){q2.textContent='¿Cómo te llamás?';q2.classList.add('v');ni.classList.add('v');setTimeout(function(){ni.focus()},500)},100);
  },1600);
}

function goBackTo1(){
  s2.classList.remove('on');bb.classList.remove('on');
  q2.classList.remove('v');ni.classList.remove('v');dlb.classList.remove('v');drow.classList.remove('v');bc2.classList.remove('v');bc2.classList.add('off');
  ni.value='';dd.value='';dm.value='';dy.value='';dateShown=false;
  ttS=.003;trB=0;tgO=1;thP=1;currentScreen=1;
  setTimeout(function(){s1.classList.add('on')},300);
}

tc(bb,function(){press(bb)},function(){rel(bb);
  if(currentScreen===2)goBackTo1();
  else if(currentScreen===3)goBackTo2();
});

var dateShown=false;
ni.addEventListener('input',function(){
  if(ni.value.trim().length>0&&!dateShown){showDate()}
  checkS2();
});
ni.addEventListener('keydown',function(e){if(e.key==='Enter'){ni.blur()}});

function showDate(){
  if(dateShown)return;dateShown=true;
  userName=ni.value.trim();
  dlb.textContent='¿Cuándo llegaste al mundo, '+userName+'?';
  dlb.classList.add('v');drow.classList.add('v');bc2.classList.add('v');
  thP=.22;ttS=.008;setTimeout(function(){ttS=.004},600);
  setTimeout(function(){dd.focus()},400);
}

dd.addEventListener('input',function(){if(dd.value.length===2)dm.focus();checkS2()});
dm.addEventListener('input',function(){if(dm.value.length===2)dy.focus();checkS2()});
dy.addEventListener('input',function(){if(dy.value.length===4)dy.blur();checkS2()});

function checkS2(){
  var ok=ni.value.trim().length>0&&dd.value.length===2&&dm.value.length===2&&dy.value.length===4;
  if(ok)bc2.classList.remove('off');else bc2.classList.add('off');
}

tc(bc2,function(){if(!bc2.classList.contains('off'))press(bc2)},function(){rel(bc2);if(!bc2.classList.contains('off'))goScreen3()});

function goScreen3(){
  userName=ni.value.trim();
  ttS=.012;trB=25;thP=.3;
  s2.classList.remove('on');
  setTimeout(function(){ttS=.004;trB=0;tgO=.35;currentScreen=3;
    pn.textContent=userName;pn.style.display='block';
    af.classList.add('on');
    avbc.style.display='block';
    avt.style.display='block';avt.classList.add('v');
    initAvatars();
  },800);
}

function goBackTo2(){
  af.classList.remove('on');avt.classList.remove('v');avt.classList.remove('m');avt.style.display='none';
  pn.classList.remove('v');pn.textContent='';pn.style.display='none';avbc.classList.remove('v');avbc.style.display='none';
  if(selAv){selAv.classList.remove('docked');selAv.style.transition='';selAv=null;selIdx=-1}
  avFirst=true;avAnim=false;
  floatR.forEach(function(r){if(r)cancelAnimationFrame(r)});
  avEls.forEach(function(el,i){el.style.opacity='0';el.style.transition='';el.style.transform='';el.style.left=aPos[i].left;el.style.top=aPos[i].top;el.style.width='78px';el.style.height='78px'});
  currentScreen=2;s2.classList.add('on');
  thP=.22;
}

var aPos=[{left:'22%',top:'30%'},{left:'58%',top:'26%'},{left:'38%',top:'39%'},{left:'18%',top:'50%'},{left:'60%',top:'48%'},{left:'40%',top:'60%'},{left:'28%',top:'70%'}];
var aFC=[{dy:-5,dx:2.5,rot:1.2,dur:5.5},{dy:-4,dx:-2,rot:-.8,dur:6.2},{dy:-6,dx:1.5,rot:.6,dur:5.8},{dy:-4.5,dx:-1.8,rot:-1,dur:6.5},{dy:-5,dx:1.2,rot:.9,dur:5.3},{dy:-5.5,dx:-1,rot:-.5,dur:6.8},{dy:-3.5,dx:2,rot:.4,dur:5.1}];
var selAv=null,selIdx=-1,floatR=[],avAnim=false,avFirst=true,dkSz=56;

function sFloat(el,cfg,i){
  var st=performance.now(),ph=Math.random()*Math.PI*2;
  function tick(now){if(el.classList.contains('docked'))return;var t=(now-st)/1000;var yo=Math.sin(t*(2*Math.PI/cfg.dur)+ph)*cfg.dy;var xo=Math.cos(t*(2*Math.PI/cfg.dur)*.7+ph)*cfg.dx;var ro=Math.sin(t*(2*Math.PI/cfg.dur)*.5+ph)*cfg.rot;el.style.transform='translate('+xo+'px,'+yo+'px) rotate('+ro+'deg)';floatR[i]=requestAnimationFrame(tick)}
  floatR[i]=requestAnimationFrame(tick);
}

function initAvatars(){
  avEls.forEach(function(el,i){
    el.style.left=aPos[i].left;el.style.top=aPos[i].top;el.style.width='78px';el.style.height='78px';
    setTimeout(function(){el.style.transition='opacity .6s ease';el.style.opacity='1';setTimeout(function(){el.style.transition='';sFloat(el,aFC[i],i)},200)},300+i*120);
  });
}

avEls.forEach(function(el,i){
  tc(el,function(){if(!avAnim)press(el)},function(){rel(el);if(!avAnim)pickAv(el,i)});
});

function pickAv(el,i){
  if(selAv===el||avAnim)return;avAnim=true;
  if(selAv){
    var p=selAv,pi=selIdx;if(floatR[pi])cancelAnimationFrame(floatR[pi]);
    p.classList.remove('docked');p.style.transition='left 1s ease,top 1s ease,width .8s ease,height .8s ease';
    p.style.left=aPos[pi].left;p.style.top=aPos[pi].top;p.style.width='78px';p.style.height='78px';
    setTimeout(function(){p.style.transition='';sFloat(p,aFC[pi],pi)},1100);
  }
  selAv=el;selIdx=i;if(floatR[i])cancelAnimationFrame(floatR[i]);
  var r=el.getBoundingClientRect();el.style.transform='';el.style.left=r.left+'px';el.style.top=r.top+'px';el.style.width=r.width+'px';el.style.height=r.height+'px';
  if(avFirst){avFirst=false;avt.classList.add('m')}
  var cx=W/2;
  requestAnimationFrame(function(){requestAnimationFrame(function(){
    el.style.transition='left 1.2s cubic-bezier(.22,.68,.35,1),top 1.2s cubic-bezier(.22,.68,.35,1),width 1.2s cubic-bezier(.22,.68,.35,1),height 1.2s cubic-bezier(.22,.68,.35,1)';
    el.style.left=(cx-dkSz/2)+'px';el.style.top='30px';el.style.width=dkSz+'px';el.style.height=dkSz+'px';el.classList.add('docked');
  })});
  setTimeout(function(){el.style.transition='';pn.classList.add('v');avbc.classList.add('v');thP=.38;ttS=.009;setTimeout(function(){ttS=.004},600);avAnim=false},1400);
}

tc(avbc,function(){press(avbc)},function(){rel(avbc);ttS=.015;trB=30;thP=.48;setTimeout(function(){ttS=.004;trB=0},800)});
</script>
</body>
</html>
